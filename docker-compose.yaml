services:
  db:
    container_name: inbank-solution-db
    image: postgres:latest
    env_file:
      - .env
    ports:
      - "5432:5432"

  backend:
    container_name: inbank-solution-backend
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/postgres
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      - db